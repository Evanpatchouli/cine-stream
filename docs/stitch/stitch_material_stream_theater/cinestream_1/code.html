<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>登录 - CineStream</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                      "on-secondary-fixed": "#00105c",

                      "surface-bright": "#f8f9fa",
                      "surface-container-low": "#f3f4f5",

                      "surface": "#f8f9fa",

              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "element-gap": "12px",
                      "section-gap": "32px",
                      "gutter": "12px",
                      "container-padding": "16px",

              "fontFamily": {

<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center p-container-padding antialiased">
<!-- Main Container -->
<main class="w-full max-w-[400px] flex flex-col gap-section-gap">
<!-- Header / Logo Area -->
<header class="flex flex-col items-center gap-element-gap text-center pt-8">
<span class="material-symbols-outlined text-[64px] text-primary" style="font-variation-settings: 'FILL' 1;">
                movie_filter
            </span>
<h1 class="font-display-lg text-display-lg text-primary tracking-tight">CineStream</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">登录以继续您的观影体验</p>
</header>
<!-- Login Form -->
<form class="flex flex-col gap-element-gap w-full mt-4">
<!-- Phone Number Input -->
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
<span class="material-symbols-outlined text-outline">phone_iphone</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm placeholder:text-outline" id="phone" name="phone" placeholder="手机号码" required="" type="tel"/>
</div>
<!-- Password Input -->
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm placeholder:text-outline" id="password" name="password" placeholder="密码" required="" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-4 text-outline hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<!-- Actions Row -->
<div class="flex justify-between items-center w-full mt-2">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-5 h-5 rounded border-outline text-primary focus:ring-primary bg-surface-container-lowest" type="checkbox"/>
<span class="font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">记住我</span>
</label>
<a class="font-label-lg text-label-lg text-primary hover:text-secondary transition-colors" href="#">忘记密码？</a>
</div>
<!-- Primary Login Button -->
<button class="w-full mt-6 py-4 bg-primary hover:bg-secondary text-on-primary font-title-lg text-title-lg rounded-full shadow-md hover:shadow-lg transition-all active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
                登录
            </button>
<!-- Registration Link -->
<div class="text-center mt-6">
<p class="font-body-md text-body-md text-on-surface-variant">
                    还没有账号？ <a class="font-label-lg text-label-lg text-primary hover:text-secondary transition-colors font-semibold" href="#">立即注册</a>
</p>
</div>
</form>
</main>
</body></html>
